name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Detect site directory
        id: site
        shell: bash
        run: |
          if [ -f "index.html" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          elif [ -f "personal-homepage/index.html" ]; then
            echo "dir=personal-homepage" >> "$GITHUB_OUTPUT"
          else
            echo "No index.html found at repo root or personal-homepage/" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.site.outputs.dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

